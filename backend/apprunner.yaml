version: 1.0
runtime: python311

# NOTE: AWS App Runner is closing to new customers on April 30, 2026.
# If you are not already an App Runner customer, consider deploying via
# container image to ECS Fargate or another service instead.
#
# NOTE: python311 is the latest managed runtime App Runner offers.
# Your project requires Python 3.12 (pyproject.toml: requires-python = ">=3.12").
# If strict 3.12 compatibility is needed, use the container image (Dockerfile) deploy
# path in App Runner instead of this managed runtime config file.

build:
  commands:
    pre-build:
      # Install git — not present in the App Runner Amazon Linux 2023 managed runtime
      - dnf install -y git
    build:
      - echo "Build phase complete"
    post-build:
      - echo "Post-build phase complete"
  env:
    - name: PYTHONDONTWRITEBYTECODE
      value: "1"
    - name: PYTHONUNBUFFERED
      value: "1"
    - name: POETRY_NO_INTERACTION
      value: "1"
    - name: POETRY_VIRTUALENVS_CREATE
      value: "false"

run:
  runtime-version: "3.11"
  # pre-run executes on every instance start before the main command.
  # For python311 revised build, this is where pip-installed packages must live
  # because the build phase only persists /app contents to the runtime snapshot.
  pre-run:
    - pip3 install poetry
    - poetry config virtualenvs.create false
    - poetry install --no-interaction --no-root
    # Install the forked lighteval library required for benchmark evaluations
    - git clone https://github.com/pjavanrood/lighteval.git /tmp/lighteval
    - pip3 install --no-build-isolation -e "/tmp/lighteval[extended_tasks]"
    - pip3 install "setuptools<82"
    # Run Alembic migrations on every startup to keep the DB schema in sync
    - python3 -m alembic upgrade head
  command: python3 -m uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2
  network:
    port: 8000
    env: PORT
  env:
    - name: AWS_REGION
      value: us-east-2
    - name: S3_BUCKET_NAME
      value: evalhub-bucket
    # Celery workers cannot run alongside the API in App Runner's single-container model.
    # Connect to an external Redis (e.g. ElastiCache or Upstash) and run Celery workers
    # as a separate App Runner service or ECS task.
    - name: CELERY_WORKERS
      value: "0"
  # Sensitive secrets — store these in AWS Secrets Manager and reference their ARNs.
  # secrets:
  #   - name: DATABASE_URL
  #     value-from: "arn:aws:secretsmanager:us-east-2:<account-id>:secret:evalhub/DATABASE_URL"
  #   - name: JWT_SECRET
  #     value-from: "arn:aws:secretsmanager:us-east-2:<account-id>:secret:evalhub/JWT_SECRET"
  #   - name: AWS_ACCESS_KEY_ID
  #     value-from: "arn:aws:secretsmanager:us-east-2:<account-id>:secret:evalhub/AWS_ACCESS_KEY_ID"
  #   - name: AWS_SECRET_ACCESS_KEY
  #     value-from: "arn:aws:secretsmanager:us-east-2:<account-id>:secret:evalhub/AWS_SECRET_ACCESS_KEY"
  #   - name: SUPABASE_URL
  #     value-from: "arn:aws:secretsmanager:us-east-2:<account-id>:secret:evalhub/SUPABASE_URL"
  #   - name: SUPABASE_PUBLISHABLE_KEY
  #     value-from: "arn:aws:secretsmanager:us-east-2:<account-id>:secret:evalhub/SUPABASE_PUBLISHABLE_KEY"
  #   - name: SUPABASE_SECRET_KEY
  #     value-from: "arn:aws:secretsmanager:us-east-2:<account-id>:secret:evalhub/SUPABASE_SECRET_KEY"
  #   - name: SUPABASE_JWT_SECRET
  #     value-from: "arn:aws:secretsmanager:us-east-2:<account-id>:secret:evalhub/SUPABASE_JWT_SECRET"
  #   - name: OPENAI_API
  #     value-from: "arn:aws:secretsmanager:us-east-2:<account-id>:secret:evalhub/OPENAI_API"
  #   - name: OPENROUTER_API_KEY
  #     value-from: "arn:aws:secretsmanager:us-east-2:<account-id>:secret:evalhub/OPENROUTER_API_KEY"
  #   - name: HF_TOKEN
  #     value-from: "arn:aws:secretsmanager:us-east-2:<account-id>:secret:evalhub/HF_TOKEN"
  #   - name: REDIS_URL
  #     value-from: "arn:aws:secretsmanager:us-east-2:<account-id>:secret:evalhub/REDIS_URL"
