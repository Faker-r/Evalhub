global
  log stdout format raw local0

defaults
  mode tcp
  log global
  option tcplog
  timeout connect 5s
  timeout client  1m
  timeout server  1m

frontend redis_tls
  bind *:6380 ssl crt /etc/haproxy/certs/redis.pem
  default_backend redis_backend

backend redis_backend
  server redis redis:6379 check
